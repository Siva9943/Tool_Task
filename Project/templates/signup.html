{% extends 'base.html' %}
{% block content %}

{% if messages %}
    {% for message in messages %}
        {% if message.tags == 'error' %}
            <div class="alert alert-danger alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% else %}
            <div class="alert alert-success alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endif %}
    {% endfor %}
{% endif %}

<div class="signup_box">
    <h3 id="title">Signup </h3>
<form method="POST" action="{% url 'tool_signup_info' %}" id="signup_info">
    {% csrf_token %}
     <div class="mb-3 row">
        <label for="user" class="col-sm-2 col-form-label">Username</label>
        <div class="col-sm-10">
            <input type="text" class="form-control" id="user" name="username" required placeholder="Eg: Siva9943">
        </div>
    </div>

    <div class="mb-3 row">
        <label for="staticEmail" class="col-sm-2 col-form-label">Email</label>
        <div class="col-sm-10">
            <input type="email" class="form-control" id="staticEmail" name="email" required placeholder="siva@inees.com" >
        </div>
    </div>
    <div class="mb-3 row">
        <label for="inputPassword1" class="col-sm-2 col-form-label">Password</label>
        <div class="col-sm-10">
            <input type="password" class="form-control" id="inputPassword1" name="password1" required placeholder="Enter the Password least 8 Characters">
        </div>
    </div>
    <div class="mb-3 row">
        <label for="inputPassword" class="col-sm-2 col-form-label">Confirm Password</label>
        <div class="col-sm-10">
            <input type="password" class="form-control" id="inputPassword" name="password2" required placeholder="Confirm Password least 8 Characters">
        </div>
    </div>
    <div class="text-center">
        <button type="submit" class="btn btn-primary">
            Signup
        </button>
    </div>
</form>
<div class="text-center">
    <a  class="mt-3 text-center" href="{% url 'tool_login_info'%}">Already have a Account </a>
</div>

</div>



{% endblock %}
