{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">

            <div class="card border-0 shadow-lg rounded-4 text-center">
                <div class="card-body p-5">

                    <!-- Success Icon -->
                    <div class="mb-4">
                        <div class="d-inline-flex align-items-center justify-content-center bg-success bg-opacity-10 rounded-circle"
                             style="width:90px;height:90px;">
                            <i class="bi bi-check-circle-fill text-success" style="font-size:3rem;"></i>
                        </div>
                    </div>

                    <!-- Heading -->
                    <h2 class="fw-bold text-dark mb-3">
                        Password Changed Successfully
                    </h2>

                    <!-- Description -->
                    <p class="text-muted mb-4">
                        Your account password has been updated successfully.
                        You can continue using your account with your new password.
                    </p>

                    <!-- Buttons -->
                    <div class="d-grid gap-3">
                        <a href="{% url 'tool_dashboard' %}"
                           class="btn btn-primary btn-lg rounded-pill">
                            <i class="bi bi-speedometer2 me-2"></i>
                            Go to Dashboard
                        </a>

                    </div>

                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
