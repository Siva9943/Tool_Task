{% extends "base.html" %}
{% block content %}
<style>
  .success-card {
    animation: fadeSlideUp 0.4s ease;
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .success-icon-wrap {
    width: 88px;
    height: 88px;
    background: linear-gradient(135deg, #d1fae5, #ecfdf5);
    box-shadow: 0 0 0 8px rgba(16, 185, 129, 0.06);
  }

  .success-icon-wrap i {
    background: linear-gradient(135deg, #059669, #10b981);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .success-heading {
    font-size: 1.6rem;
    letter-spacing: -0.01em;
  }

  .success-text {
    font-size: 0.95rem;
    line-height: 1.6;
    max-width: 360px;
    margin-left: auto;
    margin-right: auto;
  }

  .btn-dashboard {
    background: #4f46e5;
    border: none;
    font-weight: 600;
    font-size: 0.95rem;
    padding: 0.75rem 1.5rem;
    transition: background 0.15s ease, transform 0.05s ease, box-shadow 0.15s ease;
    box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
  }

  .btn-dashboard:hover {
    background: #4338ca;
    color: #fff;
    box-shadow: 0 6px 16px rgba(79, 70, 229, 0.32);
  }

  .btn-dashboard:active {
    transform: scale(0.98);
  }
</style>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">

            <div class="card border-0 shadow-lg rounded-4 text-center success-card">
                <div class="card-body p-5">
                    <h2 class="fw-bold text-dark success-heading mb-3">
                        Password Changed Successfully
                    </h2>
                    <p class="text-muted success-text mb-4">
                        Your account password has been updated. You can continue using your account securely with your new password.
                    </p>
                    <div class="d-grid">
                        <a href="{% url 'tool_dashboard' %}"
                           class="btn btn-dashboard btn-lg rounded-pill text-white">
                            <i class="bi bi-speedometer2 me-2"></i>
                            Go to Dashboard
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
