{% extends 'base.html' %}
{% block content %}

<style>
  .error-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #f8fafc, #eef4ff);
    padding: 40px 16px;
  }

  .error-card {
    max-width: 700px;
    width: 100%;
    background: #ffffff;
    border-radius: 24px;
    padding: 48px 32px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
    border: 1px solid #e5e7eb;
    animation: fadeSlideUp 0.4s ease;
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .error-icon-wrap {
    width: 76px;
    height: 76px;
    background: #fef2f2;
    box-shadow: 0 0 0 8px rgba(220, 38, 38, 0.06);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    margin-bottom: 16px;
  }

  .error-icon-wrap i {
    color: #dc2626;
    font-size: 2rem;
  }

  .error-code {
    font-size: 4.5rem;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #4f46e5, #7c6cf2);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }

  .error-title {
    font-size: 1.75rem;
    font-weight: 700;
    color: #1f2937;
    letter-spacing: -0.01em;
    margin-bottom: 12px;
  }

  .error-text {
    font-size: 0.98rem;
    line-height: 1.6;
    color: #6b7280;
    max-width: 480px;
    margin: 0 auto 28px;
  }

  .error-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .error-actions a {
    min-width: 160px;
    border-radius: 12px;
    padding: 12px 18px;
    font-weight: 600;
    font-size: 0.9rem;
    text-decoration: none;
    transition: background 0.15s ease, box-shadow 0.15s ease, transform 0.05s ease;
  }

  .error-actions a:active {
    transform: scale(0.98);
  }

  .btn-home {
    background: #4f46e5;
    color: #fff;
    box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
  }

  .btn-home:hover {
    background: #4338ca;
    color: #fff;
    box-shadow: 0 6px 16px rgba(79, 70, 229, 0.32);
  }

  .btn-login {
    background: #f3f4f6;
    color: #111827;
    border: 1px solid #d1d5db;
  }

  .btn-login:hover {
    background: #e5e7eb;
    color: #111827;
  }

  .error-footnote {
    font-size: 0.82rem;
    color: #9ca3af;
    border-top: 1px solid #f0f1f3;
    padding-top: 20px;
  }

  @media (max-width: 576px) {
    .error-card {
      padding: 36px 20px;
      border-radius: 18px;
    }

    .error-code {
      font-size: 3.5rem;
    }

    .error-title {
      font-size: 1.35rem;
    }

    .error-actions a {
      width: 100%;
    }
  }

  [data-bs-theme="dark"] .error-page {
    background: linear-gradient(135deg, #0b1220, #111827);
  }

  [data-bs-theme="dark"] .error-card {
    background: #131a2e;
    border-color: #2a3350;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  }

  [data-bs-theme="dark"] .error-title {
    color: #e2e8f0;
  }

  [data-bs-theme="dark"] .error-text {
    color: #94a3b8;
  }

  [data-bs-theme="dark"] .error-footnote {
    color: #64748b;
    border-color: #1f2937;
  }

  [data-bs-theme="dark"] .btn-login {
    background: #1a2138;
    color: #e2e8f0;
    border-color: #2a3350;
  }

  [data-bs-theme="dark"] .btn-login:hover {
    background: #202a47;
    color: #e2e8f0;
  }
</style>

<section class="error-page">
  <div class="error-card">
    <div class="error-icon-wrap">
      <i class="fa-solid fa-triangle-exclamation" aria-hidden="true"></i>
    </div>
    <div class="error-code">500</div>
    <h1 class="error-title">Internal Server Error</h1>
    <p class="error-text">
      Something went wrong on our side. Please try again in a few minutes, or head back to the homepage.
    </p>

    <div class="error-actions">
      <a href="{% url 'tool_home_info' %}" class="btn-home">Go to Home</a>
      <a href="{% url 'tool_login_info' %}" class="btn-login">Back to Login</a>
    </div>

    <p class="error-footnote mb-0">
      If this keeps happening, please contact the administrator.
    </p>
  </div>
</section>

{% endblock %}
