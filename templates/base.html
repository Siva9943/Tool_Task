{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Upload Tool</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="{% static 'css/signup.css' %}">
    <script src="{% static 'js/index.js' %}"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <style>
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .65);
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .d-none {
            display: none !important;
        }

        footer a {
            color: inherit;
            text-decoration: none;
        }

        footer a:hover {
            color: var(--bs-primary, #2F5CFF);
        }
    </style>


</head>

<body>
    {% include 'navbar.html'%}

    {% block content %}

    {% endblock %}

    <div id="loadingOverlay" class="loading-overlay d-none">
        <div class="text-center">
            <div class="spinner-border text-light" style="width:4rem;height:4rem;" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>

            <h5 class="text-white mt-3">Uploading Products...</h5>
            <p class="text-white-50">
                Please wait while we validate and import your Excel file.
            </p>
        </div>
    </div>


    <footer class="bg-body-tertiary text-body py-3 border-top">
        <div class="container text-center">
            <small>
                &copy; {% now "Y" %} Bulk Upload Tool. All rights reserved.
            </small>
        </div>
    </footer>

    <script src="{% static 'js/index.js' %}"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/JQuery.js'%}"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const toastElements = document.querySelectorAll(".toast");

            toastElements.forEach(function (toastElement) {
                const toast = new bootstrap.Toast(toastElement, {
                    delay: 3000,
                    autohide: true
                });

                toast.show();
            });
        });

        const uploadForm = document.getElementById("uploadForm");
        const loader = document.getElementById("loadingOverlay");

        uploadForm.addEventListener("submit", function () {
            if (fileInput.files.length === 0) {
                return;
            }

            loader.classList.remove("d-none");
            document.getElementById("uploadBtn").disabled = true;
        });

    </script>


</body>

</html>
