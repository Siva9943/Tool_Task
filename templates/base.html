{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Task</title>
    <link rel="stylesheet" href="{% static 'css/main.css'%}">
    <link rel="stylesheet" href="{% static 'css/signup.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    
</head>
<body class="overflow-x-hidden">
    {% include 'navbar.html'%}
    <div class="toast-container position-fixed top-0 end-0 p-3 mt-5">
    {% if messages %}
        {% for message in messages %}
            <div class="toast custom-toast align-items-center text-bg-{{ message.tags }} border-0"
                 role="alert"
                 data-bs-delay="3000"
                 data-bs-autohide="true">

                <div class="d-flex">

                    <div class="toast-body flex-grow-1">
                        {{ message }}
                        
                        <!-- Progress Bar -->
                        <div class="progress mt-2" style="height: 4px;">
                            <div class="progress-bar progress-bar-striped progress-bar-animated bg-light toast-progress"></div>
                        </div>
                    </div>

                    <button type="button"
                            class="btn-close btn-close-white me-2 m-auto"
                            data-bs-dismiss="toast"></button>
                </div>
            </div>
        {% endfor %}
    {% endif %}

</div>
    {% block content %}
    {% endblock %}

    {% block errors %}
    {% endblock %}

    <script src="{% static 'js/index.js' %}"></script>
    <script src="{% static 'js/login_form.js' %}"></script>
    <!-- <script src="{% static 'js/signup.js' %}"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
document.addEventListener("DOMContentLoaded", function () {

    const toastElements = document.querySelectorAll('.toast');

    toastElements.forEach((el) => {

        // Bootstrap toast init
        const toast = new bootstrap.Toast(el, {
            delay: 3000,
            autohide: true
        });

        toast.show();

        const progress = el.querySelector('.toast-progress');
        if (progress) {
            progress.style.animation = "none";
            progress.offsetHeight; 
            progress.style.animation = "progressBar 3s linear forwards";
        }
    });

});
</script>
</body>
</html>
