{% extends 'base.html' %}
{% load static %}

{% block content %}
{% if messages %}
    {% for message in messages %}
        {% if message.tags == 'error' %}
            <div class="alert alert-danger alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% else %}
            <div class="alert alert-success alert-dismissible fade show">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endif %}
    {% endfor %}
{% endif %}

<div class="login_box">
  <h3 id="title">Login Form</h3>
  <form method="POST" id="login_form">
    {% csrf_token %}

    <div class="mb-3 row">
        <label for="Email" class="col-sm-2 col-form-label">Email</label>
        <div class="col-sm-10">
            <input type="text" class="form-control" id="" name="email" placeholder="Enter Your Valid Email">
        </div>
    </div>

    <div class="mb-3 row">
        <label for="inputPassword" class="col-sm-2 col-form-label">Password</label>
        <div class="col-sm-10">
            <input type="password" class="form-control" id="inputPassword" name="password" placeholder="Enter Your Password">
        </div>
    </div>

    <div>Forget Password </div>

    <div class="text-center">
        <button type="submit" class="btn btn-primary">
            Login
        </button>
    </div>
</form>
<div class="text-center">
    <a class='mt-3 text-center' href="{% url 'tool_signup_info'%}">Create An Account</a>
</div>

</div>

{% endblock %}
