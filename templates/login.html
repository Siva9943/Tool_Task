{% extends 'base.html' %}
{% load static %}

{% block content %}

<link rel="stylesheet" href="{% static 'css/login.css' %}">
<div class="login-page">
    <div class="login-card">

        <div class="login-header">
            <div class="login-icon">
                <i class="bi bi-person-circle"></i>
            </div>
            <h2>Welcome Back</h2>
            <p>Sign in to continue</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert color-primary alert-{{ message.tags }} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-4">
                <label class="form-label">Email Address</label>
                <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Enter your email"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Enter your password"
                    required>
            </div>

            <div class="d-flex justify-content-end mb-4">
                <a href="{% url 'password_reset' %}" class="forgot-link">
                    Forgot Password?
                </a>
            </div>

            <button class="btn btn-primary w-100 login-btn">
                Login
            </button>

            <div class="text-center mt-4">
                Don't have an account?
                <a href="{% url 'tool_signup_info' %}" class="signup-link">
                    Register
                </a>
            </div>

        </form>

    </div>
</div>

{% endblock %}
